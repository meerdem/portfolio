<script>
(function(){
  var PPS = 60;
  function fix(){
    document.querySelectorAll('.marquee-track').forEach(function(t){
      var wrap = t.parentElement;
      var overflow = t.scrollWidth - wrap.clientWidth;
      if(overflow > 0){
        t.style.setProperty('--marquee-end', '-' + overflow + 'px');
        t.style.animationDuration = (overflow / PPS).toFixed(2) + 's';
      } else {
        t.style.animationName = 'none';
      }
    });
  }
  [100, 400, 1000].forEach(function(d){ setTimeout(fix, d); });
  window.addEventListener('resize', fix);
})();
</script>

<!-- Header: fixed + condense on scroll -->
<style>
#root{background:#fff}#root header nav{padding:13px 28px !important}@media (max-width:768px){.staggered-menu-panel{padding-top:8em !important}}#root header{position:fixed!important;top:16px!important;left:50%;transform:translateX(-50%);width:calc(100% - 28px)!important;max-width:1180px;border-radius:9999px!important;background:linear-gradient(0deg,rgba(29,122,82,0.16),rgba(29,122,82,0.16)),rgba(255,255,255,0.58)!important;backdrop-filter:blur(22px) saturate(140%)!important;-webkit-backdrop-filter:blur(22px) saturate(140%)!important;border:1px solid rgba(29,122,82,0.18)!important;box-shadow:0 14px 40px -16px rgba(29,122,82,.34)!important;transition:box-shadow .3s ease,background .3s ease}
#root header nav{transition:padding .34s cubic-bezier(.16,1,.3,1)!important}
#root header.nav-scrolled{background:linear-gradient(0deg,rgba(29,122,82,0.16),rgba(29,122,82,0.16)),rgba(255,255,255,0.58) !important;box-shadow:0 14px 40px -16px rgba(29,122,82,.34)}
#root header.nav-scrolled nav{padding-top:13px!important;padding-bottom:13px!important}
#root header nav img{transition:transform .34s cubic-bezier(.16,1,.3,1)}
#root header.nav-scrolled nav img{transform:scale(1)}@media (max-width:768px){#root header nav{padding:13px 20px !important}.staggered-menu-header{height:72px;padding:0 20px}}
#root section,[id^="wl-"]{scroll-margin-top:84px}
.staggered-menu-header{transition:height .34s cubic-bezier(.16,1,.3,1)!important}
.staggered-menu-header.nav-scrolled{height:72px!important}
</style>
<script>
(function(){
  function init(){
    var hdr = document.querySelector('#root header');
    if (!hdr){ requestAnimationFrame(init); return; }
    if (hdr.parentElement){ hdr.parentElement.style.paddingTop = (hdr.offsetHeight + 34) + 'px'; hdr.parentElement.style.background = '#fff'; }
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init); else init();
})();
</script>




</body>
</html>
