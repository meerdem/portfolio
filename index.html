<style>
/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── CSS Variables ── */
:root {
  --bg:        hsl(260 87% 3%);
  --fg:        hsl(40 6% 95%);
  --fg-sub:    hsl(40 6% 82%);
  --font-body: 'Geist', sans-serif;
  --font-head: 'General Sans', sans-serif;
}

html, body {
  background: var(--bg);
  color: var(--fg);
  font-family: var(--font-body);
  height: 100%;
  overflow-x: hidden;
}

/* ── Liquid Glass ── */
.liquid-glass {
  background: rgba(255,255,255,0.01);
  background-blend-mode: luminosity;
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  border: none;
  box-shadow: inset 0 1px 1px rgba(255,255,255,0.1);
  position: relative;
  overflow: hidden;
}
.liquid-glass::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: inherit;
  padding: 1.4px;
  background: linear-gradient(
    180deg,
    rgba(255,255,255,0.45) 0%,
    rgba(255,255,255,0.15) 20%,
    rgba(255,255,255,0)    40%,
    rgba(255,255,255,0)    60%,
    rgba(255,255,255,0.15) 80%,
    rgba(255,255,255,0.45) 100%
  );
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  pointer-events: none;
}

/* ── Hero animations ── */
@keyframes heroSlideInRight {
  from { opacity: 0; transform: translateX(56px); }
  to   { opacity: 1; transform: translateX(0); }
}
.hero-img-slide { animation: heroSlideInRight 0.75s cubic-bezier(0.22,1,0.36,1) both; }

@keyframes heroSlideIn {
  from { opacity: 0; transform: translateX(-56px); }
  to   { opacity: 1; transform: translateX(0); }
}
.hero-text-clip  { overflow: hidden; }
.hero-text-inner { animation: heroSlideIn 0.75s cubic-bezier(0.22,1,0.36,1) both; }

/* ── Marquee (bounce / ping-pong) ── */
@keyframes marquee {
  from { transform: translateX(0); }
  to   { transform: translateX(var(--marquee-end, -50%)); }
}
.marquee-track {
  display: flex;
  animation: marquee 8s cubic-bezier(0.3, 0.2, 0.7, 0.8) infinite alternate;
  will-change: transform;
  user-select: none;
  cursor: default;
}
.marquee-track * { cursor: default; user-select: none; }

/* ── Nav divider ── */
.nav-divider {
  height: 1px;
  background: linear-gradient(to right, transparent, rgba(240,234,220,0.2), transparent);
  margin-top: 3px;
}

/* ── Ghost button (dark backgrounds) ── */
@keyframes btn-sheen {
  from { transform: translateX(-120%) skewX(-18deg); }
  to   { transform: translateX(300%)  skewX(-18deg); }
}
.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  border-radius: 9999px;
  border: 1px solid rgba(240,234,220,0.15);
  background: rgba(255,255,255,0.04);
  color: var(--fg);
  font-family: var(--font-body);
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.2s, border-color 0.2s, transform 0.2s;
  letter-spacing: -0.01em;
  position: relative;
  overflow: hidden;
}
.btn-secondary::after,
.liquid-glass::after {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 35%;
  height: 100%;
  background: linear-gradient(to right, transparent 0%, rgba(255,255,255,0.22) 50%, transparent 100%);
  transform: translateX(-120%) skewX(-18deg);
  pointer-events: none;
}
.btn-secondary:hover::after,
.liquid-glass:hover::after {
  animation: btn-sheen 0.9s cubic-bezier(0.4,0,0.2,1) forwards;
}
.btn-secondary:hover {
  background: rgba(255,255,255,0.08);
  border-color: rgba(240,234,220,0.25);
  transform: translateY(-1px);
}

/* ── Primary button (light backgrounds) ── */
.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  border-radius: 9999px;
  border: 1px solid rgba(168,85,247,0.35);
  background: rgba(168,85,247,0.08);
  color: #7c3aed;
  font-family: var(--font-body);
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.2s, border-color 0.2s, transform 0.2s;
  letter-spacing: -0.01em;
}
.btn-primary:hover {
  background: rgba(168,85,247,0.15);
  border-color: rgba(168,85,247,0.55);
  transform: translateY(-1px);
}

/* ── Button sizes ── */
.btn-nav { padding: 8px 18px;  font-size: 14px; }
.btn-cta { padding: 24px 29px; font-size: 15px; }

/* ── Spinning ring ── */
/* ── Tweaks panel ── */
#tweaks-panel {
  display: none;
  position: fixed;
  bottom: 24px; right: 24px;
  width: 260px;
  background: rgba(12,8,28,0.97);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px;
  padding: 20px;
  z-index: 9999;
  backdrop-filter: blur(20px);
  font-family: var(--font-body);
  color: var(--fg);
}
#tweaks-panel.open { display: block; }
.tweak-title { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(240,234,220,0.4); margin-bottom: 16px; }
.tweak-row   { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
.tweak-label { font-size: 12px; color: rgba(240,234,220,0.55); }
.tweak-row input[type=range] { width: 100%; accent-color: #a855f7; }
.tweak-row select {
  width: 100%; background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px; padding: 6px 10px;
  color: var(--fg); font-size: 13px; cursor: pointer;
}
</style>

<!-- Tweaks panel -->
<div id="tweaks-panel">

    <label class="tweak-label">Gradient Direction</label>
    <select id="tweak-grad">
      <option value="to left">← Left (indigo→amber)</option>
      <option value="to right">→ Right (amber→indigo)</option>
      <option value="to bottom right">↘ Diagonal</option>
    </select>
  </div>
  <div class="tweak-row">
    <label class="tweak-label">Blur Overlay Opacity</label>
    <input type="range" id="tweak-blur-opacity" min="0" max="100" value="90" step="5" />
  </div>
</div>

<script src="js/main.js"></script>
<script>
(function(){
  var PPS = 60; // Pixel pro Sekunde
  function fix(){
    document.querySelectorAll('.marquee-track').forEach(function(t){
      var wrap = t.parentElement;
      var overflow = t.scrollWidth - wrap.clientWidth;
      if(overflow > 0){
        t.style.setProperty('--marquee-end', '-' + overflow + 'px');
        t.style.animationDuration = (overflow / PPS).toFixed(2) + 's';
      } else {
        t.style.animationName = 'none';
      }
    });
  }
  [100, 400, 1000].forEach(function(d){ setTimeout(fix, d); });
  window.addEventListener('resize', fix);
})();
</script>
